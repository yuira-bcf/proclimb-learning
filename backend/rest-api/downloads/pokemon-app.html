<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケモン図鑑</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .search-area {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .search-area input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    .search-area input:focus {
      outline: none;
      border-color: #0097A7;
    }
    .search-area button {
      padding: 10px 20px;
      background: #0097A7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-area button:hover {
      background: #00838F;
    }
    .search-area button:disabled {
      background: #b2dfdb;
      cursor: not-allowed;
    }
    #pokemonResult { margin-top: 16px; }
    .loading {
      text-align: center;
      color: #888;
      padding: 20px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #ddd;
      border-top: 4px solid #0097A7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      color: #d32f2f;
      text-align: center;
      padding: 20px;
    }
    .pokemon-card {
      text-align: center;
      padding: 20px;
    }
    .pokemon-card img {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }
    .pokemon-card h2 {
      color: #333;
      margin: 8px 0;
    }
    .pokemon-card .types {
      font-size: 16px;
      color: #666;
      margin-bottom: 4px;
    }
    .pokemon-card .size {
      font-size: 14px;
      color: #888;
      margin-bottom: 16px;
    }
    .stats h3 {
      margin-bottom: 10px;
      color: #333;
      font-size: 16px;
    }
    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }
    .stat-name {
      width: 110px;
      text-align: right;
      font-size: 13px;
      color: #666;
    }
    .stat-bar-bg {
      flex: 1;
      background: #eee;
      border-radius: 4px;
      height: 16px;
      overflow: hidden;
    }
    .stat-bar {
      background: #0097A7;
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .stat-value {
      width: 36px;
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    .random-btn {
      display: block;
      margin: 16px auto 0;
      padding: 8px 16px;
      background: #e0f7fa;
      color: #0097A7;
      border: 2px solid #0097A7;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    .random-btn:hover {
      background: #b2ebf2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ポケモン図鑑</h1>
    <div class="search-area">
      <input type="text" id="pokemonInput" placeholder="名前 or 番号（例: pikachu, 25）">
      <button id="searchBtn" onclick="searchPokemon()">検索</button>
    </div>
    <button class="random-btn" onclick="randomPokemon()">ランダムで表示</button>
    <div id="pokemonResult">
      <p style="text-align: center; color: #888; padding: 20px;">
        ポケモンの名前（英語）または図鑑番号を入力してください
      </p>
    </div>
  </div>

  <script>
    // タイプの日本語マッピング
    const typeNames = {
      normal: 'ノーマル', fire: 'ほのお', water: 'みず',
      electric: 'でんき', grass: 'くさ', ice: 'こおり',
      fighting: 'かくとう', poison: 'どく', ground: 'じめん',
      flying: 'ひこう', psychic: 'エスパー', bug: 'むし',
      rock: 'いわ', ghost: 'ゴースト', dragon: 'ドラゴン',
      dark: 'あく', steel: 'はがね', fairy: 'フェアリー'
    };

    // ステータス名の日本語マッピング
    const statNames = {
      'hp': 'HP',
      'attack': 'こうげき',
      'defense': 'ぼうぎょ',
      'special-attack': 'とくこう',
      'special-defense': 'とくぼう',
      'speed': 'すばやさ'
    };

    // Enterキーで検索
    document.getElementById('pokemonInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchPokemon();
    });

    async function searchPokemon() {
      const query = document.getElementById('pokemonInput').value.trim().toLowerCase();
      if (!query) {
        document.getElementById('pokemonResult').innerHTML =
          '<p class="error">ポケモン名または番号を入力してください</p>';
        return;
      }
      await fetchPokemon(query);
    }

    async function randomPokemon() {
      const id = Math.floor(Math.random() * 1010) + 1;
      await fetchPokemon(id);
    }

    async function fetchPokemon(query) {
      const resultDiv = document.getElementById('pokemonResult');
      const btn = document.getElementById('searchBtn');

      // ローディング表示 & ボタン無効化
      btn.disabled = true;
      resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>検索中...</p></div>';

      try {
        // PokeAPIを呼び出し（認証不要）
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${encodeURIComponent(query)}`);

        if (!response.ok) {
          if (response.status === 404) {
            throw new Error('ポケモンが見つかりませんでした');
          }
          throw new Error(`エラー: ${response.status}`);
        }

        const data = await response.json();

        const types = data.types
          .map(t => typeNames[t.type.name] || t.type.name)
          .join(' / ');

        const statsHTML = data.stats.map(s => {
          const name = statNames[s.stat.name] || s.stat.name;
          const pct = Math.min(s.base_stat, 200) / 2;
          return `
            <div class="stat-row">
              <span class="stat-name">${name}</span>
              <div class="stat-bar-bg">
                <div class="stat-bar" style="width: ${pct}%"></div>
              </div>
              <span class="stat-value">${s.base_stat}</span>
            </div>
          `;
        }).join('');

        const artwork = data.sprites.other['official-artwork'].front_default
          || data.sprites.front_default;

        // 結果を表示
        resultDiv.innerHTML = `
          <div class="pokemon-card">
            <img src="${artwork}" alt="${data.name}">
            <h2>No.${data.id} ${data.name.toUpperCase()}</h2>
            <p class="types">タイプ: ${types}</p>
            <p class="size">高さ: ${data.height / 10}m / 重さ: ${data.weight / 10}kg</p>
            <div class="stats">
              <h3>基本ステータス</h3>
              ${statsHTML}
            </div>
          </div>
        `;
      } catch (error) {
        if (error.name === 'TypeError') {
          resultDiv.innerHTML = '<p class="error">ネットワーク接続を確認してください</p>';
        } else {
          resultDiv.innerHTML = `<p class="error">${error.message}</p>`;
        }
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
